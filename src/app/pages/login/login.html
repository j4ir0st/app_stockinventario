<div class="login-container">
  <div class="login-overlay"></div>

  <div class="login-card">
    <div class="login-header">
      <img [src]="logoUrl" alt="Surgicorp Logo" class="login-logo">
      <h2>Control de Inventario</h2>
      <p class="login-subtitle">Ingrese sus credenciales para acceder</p>
    </div>

    <form (submit)="onLogin(); $event.preventDefault()" class="login-form">
      <div class="form-group">
        <label for="usuario">USUARIO</label>
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="usuario" name="usuario" [ngModel]="usuario()" (ngModelChange)="usuario.set($event)"
            placeholder="Nombre de usuario" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">CONTRASEÑA</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input [type]="showPassword() ? 'text' : 'password'" id="password" name="password" [ngModel]="password()"
            (ngModelChange)="password.set($event)" placeholder="••••••••" required>
          <button type="button" class="toggle-password" (click)="togglePassword()">
            <i class="fas" [class.fa-eye]="!showPassword()" [class.fa-eye-slash]="showPassword()"></i>
          </button>
        </div>
      </div>

      <div *ngIf="error()" class="error-message">
        {{ error() }}
      </div>

      <button type="submit" [disabled]="loading()" class="login-btn">
        <span *ngIf="!loading()">INGRESAR</span>
        <span *ngIf="loading()" class="loader"></span>
      </button>
    </form>

    <div class="login-footer">
      <p>© {{ currentYear() }} SurgiCorp Surgery For Life</p>
    </div>
  </div>
</div>
